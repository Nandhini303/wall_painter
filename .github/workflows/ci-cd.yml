name: Smart Wall Paint Visualizer CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test-backend:
    name: Backend CI (Express Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: express-server/package-lock.json

      - name: Install Express Dependencies
        run: |
          cd express-server
          npm ci

      - name: Build Express TypeScript Application
        run: |
          cd express-server
          npm run build

  build-and-test-frontend:
    name: Frontend CI (Angular 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: angular-client/package-lock.json

      - name: Install Angular Dependencies
        run: |
          cd angular-client
          npm ci

      - name: Build Angular Client Application
        run: |
          cd angular-client
          npm run build -- --configuration production

  docker-build-verification:
    name: Docker Container Build Verification
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-frontend]

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Validate Docker Compose Configuration
        run: |
          docker compose config

  playwright-e2e-tests:
    name: End-to-End Browser Testing (Playwright)
    runs-on: ubuntu-latest
    needs: [build-and-test-frontend]

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd angular-client
          npm ci

      - name: Install Playwright Browsers
        run: |
          cd angular-client
          npx playwright install --with-deps

      - name: Verify Playwright E2E Test Suite
        run: |
          cd angular-client
          npx playwright test --pass-with-no-tests

