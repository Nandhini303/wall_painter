<div class="register-container">
  <div class="glass-card">
    <div class="header">
      <h2>LuminaPaint</h2>
      <p>Create your design consultant profile</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="register-form">
      @if (errorMessage()) {
        <div class="error-alert">
          {{ errorMessage() }}
        </div>
      }
      @if (successMessage()) {
        <div class="success-alert">
          {{ successMessage() }}
        </div>
      }

      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input 
            type="text" 
            id="firstName" 
            name="firstName" 
            [(ngModel)]="firstName" 
            placeholder="John" 
            required
          />
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input 
            type="text" 
            id="lastName" 
            name="lastName" 
            [(ngModel)]="lastName" 
            placeholder="Doe" 
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          placeholder="name@company.com" 
          required 
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          placeholder="•••••••• (Min 6 chars)" 
          required
        />
      </div>

      <button type="submit" [disabled]="isLoading()" class="submit-btn">
        @if (isLoading()) {
          <span>Creating account...</span>
        } @else {
          <span>Create Account</span>
        }
      </button>
    </form>

    <div class="footer">
      <p>Already have an account? <a routerLink="/login">Sign In</a></p>
    </div>
  </div>
</div>
