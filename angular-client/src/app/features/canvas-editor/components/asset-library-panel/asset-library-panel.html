<div class="panel-container" [class.expanded]="isExpanded()">
  <div class="panel-header" (click)="isExpanded.set(!isExpanded())">
    <div class="panel-title">
      <lucide-icon name="image" [size]="16" [strokeWidth]="2" class="icon"></lucide-icon>
      <h3>Asset Library</h3>
    </div>
    <button class="toggle-btn">
      @if (isExpanded()) { <lucide-icon name="chevron-down" [size]="16"></lucide-icon> }
      @else { <lucide-icon name="chevron-up" [size]="16"></lucide-icon> }
    </button>
  </div>

  @if (isExpanded()) {
    <div class="panel-content">
      <div class="upload-zone" 
           (dragover)="onDragOver($event)" 
           (dragleave)="onDragLeave($event)" 
           (drop)="onDrop($event)"
           (click)="fileInput.click()">
        @if (uploading()) {
          <div class="upload-progress-overlay">
            <span>Uploading... {{ uploadProgress() }}%</span>
            <div class="progress-bar">
              <div class="progress-fill" [style.width.%]="uploadProgress()"></div>
            </div>
          </div>
        } @else {
          <lucide-icon name="upload-cloud" [size]="24" class="icon"></lucide-icon>
          <span>Drag & Drop or Click</span>
        }
        <input #fileInput type="file" accept="image/png, image/jpeg, image/webp, image/svg+xml" style="display: none" (change)="onFileSelected($event)">
      </div>

      <div class="asset-filters">
        <input type="text" placeholder="Search assets..." [ngModel]="searchQuery()" (ngModelChange)="searchQuery.set($event)" class="search-input">
        <div class="filter-chips">
          <button [class.active]="activeFilter() === 'All'" (click)="activeFilter.set('All')">All</button>
          <button [class.active]="activeFilter() === 'Image'" (click)="activeFilter.set('Image')">Images</button>
          <button [class.active]="activeFilter() === 'Texture'" (click)="activeFilter.set('Texture')">Textures</button>
        </div>
      </div>

      <div class="assets-grid">
        @if (assetService.isLoading()) {
          <div class="loading-state">Loading...</div>
        } @else {
          @for (asset of filteredAssets; track asset._id) {
            <div class="asset-tile" draggable="true" (dragstart)="onDragStartAsset($event, asset)" [title]="asset.name">
              <div class="asset-thumb" [style.background-image]="'url(' + (asset.thumbnailUrl || asset.secureUrl) + ')'"></div>
              <div class="asset-overlay">
                <button (click)="copyUrl(asset.secureUrl, $event)" title="Copy URL"><lucide-icon name="copy" [size]="14"></lucide-icon></button>
                <button (click)="deleteAsset(asset.publicId, $event)" class="danger" title="Delete"><lucide-icon name="trash-2" [size]="14"></lucide-icon></button>
              </div>
            </div>
          }
          @if (filteredAssets.length === 0) {
            <div class="empty-state">No assets found.</div>
          }
        }
      </div>
    </div>
  }
</div>
