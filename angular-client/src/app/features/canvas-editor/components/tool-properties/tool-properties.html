<div class="panel-section">
  <div class="panel-header">
    <h3>Tool Properties</h3>
  </div>
  <div class="panel-body">
    <div class="prop-group">
      <div class="prop-label-row">
        <label>Brush Size</label>
        <span class="prop-value">{{ studio.brushSize() }}px</span>
      </div>
      <input type="range" class="oc-slider" min="5" max="100" [ngModel]="studio.brushSize()" (ngModelChange)="studio.brushSize.set($event)" />
    </div>

    <div class="prop-group">
      <div class="prop-label-row">
        <label>Opacity</label>
        <span class="prop-value">{{ (studio.brushOpacity() * 100).toFixed(0) }}%</span>
      </div>
      <input type="range" class="oc-slider" min="0.1" max="1" step="0.05" [ngModel]="studio.brushOpacity()" (ngModelChange)="studio.brushOpacity.set($event)" />
    </div>
  </div>
</div>
